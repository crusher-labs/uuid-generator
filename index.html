<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID/GUID Generator</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 42rem; margin-inline: auto; }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-6); text-align: center; }

        .tool-uuid-display {
            padding: var(--crusher-spacing-6);
            border-radius: var(--crusher-radius-lg);
            border: 1px solid var(--crusher-border-primary);
            background: var(--crusher-background-muted);
            color: var(--crusher-color-brand-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(var(--crusher-font-size-lg), 3vw, var(--crusher-font-size-2xl));
            font-weight: 700;
            letter-spacing: 0.08em;
            word-break: break-all;
        }

        .tool-primary-row {
            display: flex; flex-wrap: wrap; gap: var(--crusher-spacing-4); justify-content: center;
        }
        .tool-action {
            padding-inline: var(--crusher-spacing-6);
            padding-block: var(--crusher-spacing-3);
            border-radius: var(--crusher-radius-full);
            font-weight: 600;
            font-size: var(--crusher-font-size-md);
        }
        .tool-version-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--crusher-spacing-4);
        }
        .tool-version-btn {
            padding-inline: var(--crusher-spacing-4);
            padding-block: var(--crusher-spacing-2);
            border-radius: var(--crusher-radius-lg);
            font-weight: 500;
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">UUID/GUID Generator</h1>
            <p class="crusher-tool-lede">Generate unique identifiers for testing.</p>
        </header>

        <div class="tool-stack">
            <section class="crusher-tool-surface tool-section">
                <div id="uuid-display" class="tool-uuid-display">Generating...</div>

                <div class="tool-primary-row">
                    <button id="generate-btn" type="button" class="crusher-tool-action tool-action">Generate New</button>
                    <button id="copy-btn" type="button" class="crusher-tool-action tool-action">Copy</button>
                </div>

                <div class="tool-version-grid">
                    <button id="v4-btn" type="button" class="crusher-tool-action tool-version-btn">Version 4 (Random)</button>
                    <button id="v1-btn" type="button" class="crusher-tool-action tool-version-btn">Version 1 (Time)</button>
                </div>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js"></script>

    <script>
        const display = document.getElementById('uuid-display');
        const copyBtn = document.getElementById('copy-btn');

        function generateV4() {
            display.textContent = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Simple V1 approximation (not strictly time-ordered without node)
        function generateV1() {
            const now = Date.now();
            const time = now.toString(16).padStart(16, '0');
            const random = 'xxxxxxxxxxxx'.replace(/x/g, () => Math.floor(Math.random() * 16).toString(16));
            display.textContent = time.slice(8) + random + '-1' + random.slice(0, 12);
        }

        document.getElementById('generate-btn').addEventListener('click', generateV4);
        document.getElementById('v4-btn').addEventListener('click', generateV4);
        document.getElementById('v1-btn').addEventListener('click', generateV1);

        copyBtn.addEventListener('click', async () => {
            const value = display.textContent;
            try {
                await navigator.clipboard.writeText(value);
            } catch {
                const textarea = document.createElement('textarea');
                textarea.value = value;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
        });

        generateV4();
    </script>
</body>
</html>
